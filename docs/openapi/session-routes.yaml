openapi: 3.0.3
info:
  title: Session Routes API
  version: 1.0.0
tags:
  - name: session
paths:
  /session/refresh:
    post:
      tags: [session]
      summary: Refresh access and refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
  /session/active:
    get:
      tags: [session]
      summary: Get active sessions excluding current
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Active sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeviceSessionDto'
  /session/revoke/{sessionId}:
    delete:
      tags: [session]
      summary: Revoke one session
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Confirmation text
          content:
            text/plain:
              schema:
                type: string
  /session/revoke-others:
    delete:
      tags: [session]
      summary: Revoke all sessions except current
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Confirmation text
          content:
            text/plain:
              schema:
                type: string
  /session/revoke-all:
    delete:
      tags: [session]
      summary: Revoke all sessions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Confirmation text
          content:
            text/plain:
              schema:
                type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    TokenPair:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
    DeviceSessionDto:
      type: object
      required: [id, deviceName, location, firstSeen, lastSeen, isMobile, isCurrent]
      properties:
        id:
          type: string
          format: uuid
        deviceName:
          type: string
        location:
          type: string
        firstSeen:
          type: string
          format: date-time
        lastSeen:
          type: string
          format: date-time
        isMobile:
          type: boolean
        isCurrent:
          type: boolean