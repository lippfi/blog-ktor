# Email bodies (HTML format)
email_body_registration_confirm=<div style="background:#f4f5f7;padding:40px 16px;font-family:Arial,sans-serif;"><div style="max-width:480px;margin:0 auto;background:#ffffff;border-radius:12px;padding:32px 24px;box-shadow:0 4px 20px rgba(0,0,0,0.05);"><div style="font-size:20px;font-weight:600;color:#111;margin-bottom:16px;">Confirm your email</div><div style="font-size:14px;color:#444;margin-bottom:24px;">Thank you for registering.<br/>Use the code below to verify your email address.</div><div style="text-align:center;margin:32px 0;"><div style="display:inline-block;padding:16px 20px;border:1px solid #e0e0e0;border-radius:10px;background:#f9fafb;font-family:'Courier New',monospace;font-size:22px;letter-spacing:2px;color:#111;">{{confirmationCode}}</div></div><div style="font-size:13px;color:#666;margin-bottom:16px;">This code is valid for 24 hours.</div><div style="font-size:13px;color:#999;">If you did not register, ignore this email.</div></div></div>
email_body_email_change_confirm=<div style="background:#f4f5f7;padding:40px 16px;font-family:Arial,sans-serif;"><div style="max-width:480px;margin:0 auto;background:#ffffff;border-radius:12px;padding:32px 24px;box-shadow:0 4px 20px rgba(0,0,0,0.05);"><div style="font-size:20px;font-weight:600;color:#111;margin-bottom:16px;">Confirm your email change</div><div style="font-size:14px;color:#444;margin-bottom:24px;">You requested to change your email address.<br/>Use the code below to confirm this change.</div><div style="text-align:center;margin:32px 0;"><div style="display:inline-block;padding:16px 20px;border:1px solid #e0e0e0;border-radius:10px;background:#f9fafb;font-family:'Courier New',monospace;font-size:22px;letter-spacing:2px;color:#111;">{{confirmationCode}}</div></div><div style="font-size:13px;color:#666;margin-bottom:16px;">This code is valid for 24 hours.</div><div style="font-size:13px;color:#999;">If you did not request this change, ignore this email and make sure your account is secure.</div></div></div>
email_body_email_changed=<div style="background:#f4f5f7;padding:40px 16px;font-family:Arial,sans-serif;"><div style="max-width:480px;margin:0 auto;background:#ffffff;border-radius:12px;padding:32px 24px;box-shadow:0 4px 20px rgba(0,0,0,0.05);"><div style="font-size:20px;font-weight:600;color:#111;margin-bottom:16px;">Email changed</div><div style="font-size:14px;color:#444;margin-bottom:24px;">Your email address has been successfully changed.</div><div style="margin:24px 0;"><div style="font-size:12px;color:#666;margin-bottom:8px;">New email</div><div style="display:inline-block;padding:12px 16px;border:1px solid #e0e0e0;border-radius:10px;background:#f9fafb;font-size:16px;color:#111;">{{newEmail}}</div></div><div style="font-size:13px;color:#999;">If you did not request this change, contact support immediately.</div></div></div>
email_body_password_reset=<div style="background:#f4f5f7;padding:40px 16px;font-family:Arial,sans-serif;"><div style="max-width:480px;margin:0 auto;background:#ffffff;border-radius:12px;padding:32px 24px;box-shadow:0 4px 20px rgba(0,0,0,0.05);"><div style="font-size:20px;font-weight:600;color:#111;margin-bottom:16px;">Reset your password</div><div style="font-size:14px;color:#444;margin-bottom:24px;">You requested a password reset.<br/>Use the code below to continue.</div><div style="text-align:center;margin:32px 0;"><div style="display:inline-block;padding:16px 20px;border:1px solid #e0e0e0;border-radius:10px;background:#f9fafb;font-family:'Courier New',monospace;font-size:22px;letter-spacing:2px;color:#111;">{{resetCode}}</div></div><div style="font-size:13px;color:#666;margin-bottom:16px;">This code expires in 30 minutes.</div><div style="font-size:13px;color:#999;">If you did not request a password reset, ignore this email and do not share this code with anyone.</div></div></div>
email_body_password_changed=<div style="background:#f4f5f7;padding:40px 16px;font-family:Arial,sans-serif;"><div style="max-width:480px;margin:0 auto;background:#ffffff;border-radius:12px;padding:32px 24px;box-shadow:0 4px 20px rgba(0,0,0,0.05);"><div style="font-size:20px;font-weight:600;color:#111;margin-bottom:16px;">Password changed</div><div style="font-size:14px;color:#444;margin-bottom:24px;">Your password has been successfully changed.</div><div style="font-size:13px;color:#666;margin-bottom:16px;">If you did not initiate this change, secure your email account and reset your password again immediately.</div><div style="font-size:13px;color:#999;">If you made this change yourself, no further action is needed. Do not share your password with anyone.</div></div></div>

