ktor:
    application:
        modules:
            - fi.lipp.blog.ApplicationKt.module
    deployment:
        port: 8080
jwt:
    issuer: "blog application"
    audience: "jwt-audience"
    realm: "ktor sample app"
    secret: "pupa"
mail:
    host: "host"
    port: ""
    email: ""
    password: ""
    from: ""
    api-key: ""
geoip:
    database: "/path/to/GeoLite2-City.mmdb"
storage:
    base_dir: "/tmp"
    base_url: "http://localhost:8000"
    use_cdn: false
    cdn_base_url: ""
    cdn_api_key: ""
    max_file_sizes:
        image: 10485760       # 10 MB
        video: 104857600      # 100 MB
        audio: 20971520       # 20 MB
        style: 262144         # 256 KB
        other: 5242880        # 5 MB
        avatar: 1048576       # 1 MB
        reaction: 524288      # 512 KB
security:
    bcrypt_cost: 15
reactions:
    basic: ["like", "love", "haha", "wow", "sad", "angry"]